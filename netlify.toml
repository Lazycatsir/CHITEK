[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# English subdomain: en.chitek-inno.com → /en/ path
[[redirects]]
  from = "https://en.chitek-inno.com/*"
  to = "/en/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
