[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# 静态资源直接提供（不走重定向，避免 /_astro 被转发到 /en/_astro）
[[redirects]]
  from = "/_astro/*"
  to = "/_astro/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

# 各语言子域名 → 对应路径（force 确保始终转发）
[[redirects]]
  from = "https://en.chitek-inno.com/*"
  to = "/en/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://www.en.chitek-inno.com/*"
  to = "/en/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://es.chitek-inno.com/*"
  to = "/es/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://www.es.chitek-inno.com/*"
  to = "/es/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://ar.chitek-inno.com/*"
  to = "/ar/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://www.ar.chitek-inno.com/*"
  to = "/ar/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://pt.chitek-inno.com/*"
  to = "/pt/:splat"
  status = 200
  force = true

[[redirects]]
  from = "https://www.pt.chitek-inno.com/*"
  to = "/pt/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
