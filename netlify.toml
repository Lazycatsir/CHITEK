[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# English subdomain: www.en.chitek-inno.com / en.chitek-inno.com → /en/ path
# 不用 force，让 Netlify 先检查文件是否存在，资源文件直接提供
[[redirects]]
  from = "https://en.chitek-inno.com/*"
  to = "/en/:splat"
  status = 200

[[redirects]]
  from = "https://www.en.chitek-inno.com/*"
  to = "/en/:splat"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
